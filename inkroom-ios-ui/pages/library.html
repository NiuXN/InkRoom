/* ============================================
   墨斋 InkRoom — Brand Design Tokens
   东方禅意 · 水墨书房 · iOS 阅读器
   ============================================ */

:root {
  /* ── Color System: 水墨禅意 ── */
  --color-primary: #C45C4A;
  --color-primary-hover: #B04A39;
  --color-primary-light: rgba(196, 92, 74, 0.12);
  --color-primary-muted: rgba(196, 92, 74, 0.06);

  /* ── Surface & Background: 纸张色系 ── */
  --color-bg-primary: #F5F0E8;
  --color-bg-secondary: #EDE7DB;
  --color-bg-elevated: #FAF7F2;
  --color-bg-card: #FFFFFF;
  --color-bg-overlay: rgba(44, 44, 44, 0.5);

  /* ── Text: 墨色层次 ── */
  --color-text-primary: #2C2C2C;
  --color-text-secondary: #6B6B6B;
  --color-text-tertiary: #9A9A9A;
  --color-text-inverse: #F5F0E8;
  --color-text-on-primary: #FFFFFF;

  /* ── Border & Divider ── */
  --color-border: rgba(44, 44, 44, 0.08);
  --color-border-strong: rgba(44, 44, 44, 0.16);
  --color-divider: rgba(44, 44, 44, 0.06);

  /* ── State Colors ── */
  --state-success: #4A8C6F;
  --state-warning: #C49A4A;
  --state-error: #C44A4A;
  --state-info: #4A7BC4;

  /* ── Typography ── */
  --font-family-base: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Noto Sans SC", "Helvetica Neue", sans-serif;
  --font-family-display: "Noto Serif SC", "Songti SC", "STSong", Georgia, serif;
  --font-family-mono: "SF Mono", "Menlo", monospace;

  --font-size-xs: 10px;
  --font-size-sm: 12px;
  --font-size-base: 14px;
  --font-size-md: 16px;
  --font-size-lg: 20px;
  --font-size-xl: 24px;
  --font-size-2xl: 28px;
  --font-size-3xl: 34px;

  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  --line-height-tight: 1.25;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.75;
  --letter-spacing-tight: -0.02em;
  --letter-spacing-normal: 0;
  --letter-spacing-wide: 0.04em;

  /* ── Spacing ── */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 12px;
  --spacing-base: 16px;
  --spacing-lg: 20px;
  --spacing-xl: 24px;
  --spacing-2xl: 32px;
  --spacing-3xl: 40px;
  --spacing-4xl: 48px;

  /* ── Radius ── */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ── Shadow ── */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.05);
  --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.06);
  --shadow-float: 0 12px 32px rgba(0, 0, 0, 0.08);

  /* ── Reading Theme Tokens ── */
  --reader-bg-light: #F5F0E8;
  --reader-bg-warm: #F0E6D0;
  --reader-bg-dark: #1A1A1A;
  --reader-text-light: #2C2C2C;
  --reader-text-dark: #D4CFC7;
}

/* ── Dark Mode ── */
.dark {
  --color-bg-primary: #1A1A1A;
  --color-bg-secondary: #242424;
  --color-bg-elevated: #2A2A2A;
  --color-bg-card: #2E2E2E;
  --color-bg-overlay: rgba(0, 0, 0, 0.6);

  --color-text-primary: #D4CFC7;
  --color-text-secondary: #A0A0A0;
  --color-text-tertiary: #6B6B6B;
  --color-text-inverse: #2C2C2C;

  --color-border: rgba(255, 255, 255, 0.08);
  --color-border-strong: rgba(255, 255, 255, 0.16);
  --color-divider: rgba(255, 255, 255, 0.06);

  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.3);
  --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.4);
  --shadow-float: 0 12px 32px rgba(0, 0, 0, 0.5);
}

/* ── Typography Classes ── */
.typo-display {
  font-family: var(--font-family-display);
  font-weight: var(--font-weight-bold);
  letter-spacing: var(--letter-spacing-wide);
}

.typo-heading {
  font-family: var(--font-family-base);
  font-weight: var(--font-weight-semibold);
  letter-spacing: var(--letter-spacing-tight);
}

.typo-body {
  font-family: var(--font-family-base);
  font-weight: var(--font-weight-normal);
}

.typo-caption {
  font-family: var(--font-family-base);
  font-weight: var(--font-weight-normal);
  color: var(--color-text-tertiary);
}

/* ── Ink Wash Accent Utility ── */
.ink-wash {
  background: linear-gradient(135deg, var(--color-bg-primary) 0%, var(--color-bg-secondary) 100%);
}

.ink-accent-bar {
  width: 32px;
  height: 3px;
  background: var(--color-primary);
  border-radius: var(--radius-full);
}

/* ── iOS Frosted Glass Utilities ── */
.ios-frosted-bar {
  background: rgba(250, 247, 242, 0.72);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
}
.ios-frosted-card {
  background: rgba(255, 255, 255, 0.65);
  backdrop-filter: saturate(150%) blur(16px);
  -webkit-backdrop-filter: saturate(150%) blur(16px);
}
.ios-frosted-tab {
  background: rgba(250, 247, 242, 0.78);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
}

    </style>

    <style type="text/tailwindcss">
  @theme inline {
    --color-inkroom-primary: var(--color-primary);
    --color-inkroom-primary-hover: var(--color-primary-hover);
    --color-inkroom-primary-light: var(--color-primary-light);
    --color-inkroom-primary-muted: var(--color-primary-muted);
    --color-inkroom-bg-primary: var(--color-bg-primary);
    --color-inkroom-bg-secondary: var(--color-bg-secondary);
    --color-inkroom-bg-elevated: var(--color-bg-elevated);
    --color-inkroom-bg-card: var(--color-bg-card);
    --color-inkroom-text-primary: var(--color-text-primary);
    --color-inkroom-text-secondary: var(--color-text-secondary);
    --color-inkroom-text-tertiary: var(--color-text-tertiary);
    --color-inkroom-text-inverse: var(--color-text-inverse);
    --color-inkroom-text-on-primary: var(--color-text-on-primary);
    --color-inkroom-border: var(--color-border);
    --color-inkroom-border-strong: var(--color-border-strong);
    --color-inkroom-divider: var(--color-divider);
    --color-inkroom-state-success: var(--state-success);
    --color-inkroom-state-warning: var(--state-warning);
    --color-inkroom-state-error: var(--state-error);
    --color-inkroom-state-info: var(--state-info);
    --color-inkroom-shadow-sm: var(--shadow-sm);
    --color-inkroom-shadow-md: var(--shadow-md);
    --color-inkroom-shadow-lg: var(--shadow-lg);
  }
  @layer base {
    body { background: var(--color-bg-primary); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>

    <script>
      lucide.createIcons();

      let currentView = 'grid';

      function setView(view) {
        currentView = view;
        const gridView = document.getElementById('book-grid-view');
        const listView = document.getElementById('book-list-view');
        const gridBtn = document.getElementById('view-grid-btn');
        const listBtn = document.getElementById('view-list-btn');

        if (view === 'grid') {
          gridView.classList.remove('hidden');
          listView.classList.add('hidden');
          gridBtn.style.background = 'var(--color-primary-light)';
          gridBtn.style.color = 'var(--color-primary)';
          listBtn.style.background = 'transparent';
          listBtn.style.color = 'var(--color-text-tertiary)';
        } else {
          gridView.classList.add('hidden');
          listView.classList.remove('hidden');
          listBtn.style.background = 'var(--color-primary-light)';
          listBtn.style.color = 'var(--color-primary)';
          gridBtn.style.background = 'transparent';
          gridBtn.style.color = 'var(--color-text-tertiary)';
        }
        lucide.createIcons();
      }

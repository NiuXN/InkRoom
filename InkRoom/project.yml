name: InkRoom
options:
  bundleIdPrefix: com.inkroom.app
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true

schemeTemplates:
  App:
    build:
      targets:
        InkRoom_iOS: all
        InkRoom_macOS: all
        InkRoomWidget_iOS: all
        InkRoomWidget_macOS: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

schemes:
  InkRoom:
    templates:
      - App
  InkRoom_macOS:
    build:
      targets:
        InkRoom_macOS: all
        InkRoomWidget_macOS: all
    test:
      config: Debug
      targets:
        - InkRoomTests_macOS
  InkRoom_iOS:
    build:
      targets:
        InkRoom_iOS: all
        InkRoomWidget_iOS: all
    test:
      config: Debug
      targets:
        - InkRoomTests_iOS

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: false
    ENABLE_PREVIEWS: true

packages:
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift
    from: "0.15.0"
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: "0.9.0"
  Swifter:
    url: https://github.com/httpswift/swifter
    from: "1.5.0"

targets:
  InkRoom:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: Sources
        type: group
      - path: Resources
        type: group
        excludes:
          - Info.plist
    dependencies:
      - package: SQLite
        product: SQLite
      - package: ZIPFoundation
      - package: Swifter
        product: Swifter
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.inkroom.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.books"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2025 InkRoom. All rights reserved."
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      configs:
        debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: RELEASE

  InkRoomWidget:
    type: app-extension
    platform: [iOS, macOS]
    sources:
      - path: Widget
        type: group
      - path: Sources/Models/WidgetData.swift
      - path: Sources/Utilities/Color+InkRoom.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.inkroom.app.widget
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: "墨斋小组件"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2025 InkRoom. All rights reserved."
        SWIFT_EMIT_LOC_STRINGS: true
      configs:
        debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: RELEASE

  InkRoomTests_iOS:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
        type: group
    dependencies:
      - target: InkRoom_iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.inkroom.app.tests
        GENERATE_INFOPLIST_FILE: true
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/InkRoom.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/InkRoom"

  InkRoomTests_macOS:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        type: group
    dependencies:
      - target: InkRoom_macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.inkroom.app.tests
        GENERATE_INFOPLIST_FILE: true
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/InkRoom.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/InkRoom"
